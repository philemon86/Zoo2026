<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="icon" type="image/png" href="../assets/common/favicon.png">
  <title>海報頁面</title>
  <style>
    * {
      box-sizing: border-box;
    }

    html,
    body {
      margin: 0;
      padding: 0;
      background: #ffffff;
    }

    body {
      font-family: "Noto Sans TC", "Microsoft JhengHei", sans-serif;
    }

    .posters {
      width: 100%;
    }

    .poster {
      display: block;
      width: 100%;
      max-width: 1200px;
      height: auto;
      margin: 0 auto;
    }

    .paper-footer {
      display: flex;
      justify-content: center;
      padding: 20px 16px 28px;
    }

    .home-btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 38px;
      padding: 8px 16px;
      border-radius: 999px;
      border: 1px solid rgba(44, 62, 51, 0.14);
      background: #fff8ea;
      color: #2b4036;
      text-decoration: none;
      font-size: 14px;
      font-weight: 700;
      box-shadow: 0 8px 18px rgba(88, 69, 33, 0.08);
    }
  </style>
</head>
<body>
  <main class="posters">
    <img class="poster" src="https://drive.google.com/thumbnail?id=1JzkERcYCWPj4vpO6fMkZ7jnS2hVe-e-1&sz=w4000" alt="排版1_0 海報">
    <img class="poster" src="https://drive.google.com/thumbnail?id=1iSV6Y2JnHU3k7lx4_q_61ch7WdahEsmz&sz=w4000" alt="排版2_0 海報">
    <img class="poster" src="https://drive.google.com/thumbnail?id=13LSuYisVRQnkNo6Vw7LMNuEwXF9_eN6G&sz=w4000" alt="排版3_0 海報">
    <img class="poster" src="https://drive.google.com/thumbnail?id=1x8oC14i-Rd1c88LlBtdruFifvbVK25dL&sz=w4000" alt="排版4_0 海報">
    <div class="paper-footer">
      <a class="home-btn" href="../">首頁</a>
    </div>
  </main>
</body>
</html>

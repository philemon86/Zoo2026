<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="icon" type="image/png" href="assets/common/favicon.png">
  <link rel="stylesheet" href="assets/common/bear-cursor.css">
  <link rel="stylesheet" href="assets/common/footstep-transition.css">
  <title>禮品、文具、桌遊</title>
  <style>
    :root { --ink: #3e2f21; --paper: rgba(255, 249, 237, .88); --line: rgba(123, 87, 49, .2); --shadow: 0 22px 46px rgba(67, 45, 21, .18); }
    * { box-sizing: border-box; }
    body { margin: 0; min-height: 100vh; color: var(--ink); font-family: "Noto Sans TC", "Microsoft JhengHei", "PingFang TC", sans-serif; background: #f5ead6; cursor: url("assets/common/bear-cursor-64.png") 14 2, auto; }
    a { color: inherit; text-decoration: none; }
    .page { min-height: 100vh; background: linear-gradient(180deg, rgba(255, 249, 236, .18), rgba(245, 234, 214, .42)), #f5ead6; }
    .topbar { position: fixed; top: 18px; left: 50%; z-index: 30; width: min(640px, calc(100vw - 32px)); display: grid; grid-template-columns: minmax(0, 1fr) auto; align-items: center; column-gap: 18px; padding: 10px 18px; transform: translateX(-50%); border: 1px solid rgba(123, 87, 49, .16); border-radius: 10px; background: rgba(255, 248, 232, .84); box-shadow: 0 12px 24px rgba(80, 58, 23, .1); backdrop-filter: blur(8px); }
    .brand { min-width: 0; }
    .brand strong { display: block; min-width: 0; font-size: clamp(20px, 2.3vw, 30px); line-height: 1.08; letter-spacing: .06em; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .brand span { display: block; margin-top: 4px; color: #71563c; font-size: 13px; letter-spacing: .08em; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .nav-link { display: inline-flex; align-items: center; justify-content: center; justify-self: end; flex: 0 0 auto; min-height: 40px; padding: 8px 16px; border-radius: 999px; color: #fffaf0; background: linear-gradient(135deg, #7d6038, #5f704c); font-weight: 800; letter-spacing: .05em; white-space: nowrap; }
    .stage { position: relative; min-height: 100vh; overflow: hidden; isolation: isolate; }
    .stage-frame { position: relative; width: 100%; min-height: 100vh; }
    .stage-bg { position: absolute; inset: 0; z-index: -2; width: 100%; height: 100%; object-fit: cover; object-position: center center; }
    .stage::after { content: ""; position: absolute; inset: 0; z-index: -1; background: linear-gradient(180deg, rgba(255, 250, 241, .01), rgba(245, 234, 214, .06)); pointer-events: none; }
    .signs { position: relative; min-height: 100vh; padding: 120px clamp(18px, 4vw, 48px) 56px; }
    .sign { position: absolute; display: block; width: min(26vw, 320px); filter: drop-shadow(0 18px 24px rgba(63, 40, 18, .22)); user-select: none; -webkit-user-drag: none; }
    .sign-link { cursor: pointer; transition: transform .18s ease, filter .18s ease; }
    .sign-link:hover { filter: drop-shadow(0 22px 28px rgba(63, 40, 18, .28)); }
    .sign-link img { display: block; width: 100%; height: auto; }
    .sign-gift { left: 14.6%; top: 52.6%; width: 16.8%; transform: translate(-50%, -50%); }
    .sign-stationery { left: 82.7%; top: 54.4%; width: 17%; transform: translate(-50%, -50%); }
    .sign-game { left: 49.1%; top: 43.6%; width: 17.1%; transform: translate(-50%, -50%); }
    @media (max-width: 767px) {
      body { cursor: auto; }
      .topbar { top: auto; bottom: 12px; width: calc(100vw - 24px); grid-template-columns: minmax(0, 1fr) auto; column-gap: 10px; padding: 9px 14px; }
      .brand strong { font-size: 16px; text-align: left; white-space: nowrap; }
      .brand span { display: none; }
      .nav-link { min-height: 36px; width: auto; min-width: 88px; padding: 7px 12px; font-size: 13px; }
      .stage { min-height: 100svh; display: grid; place-items: center; }
      .stage-frame { width: max(100vw, calc(100svh * 9 / 16)); min-height: 100svh; aspect-ratio: 9 / 16; }
      .stage-bg { object-fit: cover; object-position: center top; }
      .signs { min-height: 100%; padding: 0; }
      .sign { width: min(42vw, 170px); }
      .sign-gift { left: 44.4%; top: 16.5%; width: 28.2%; transform: translate(-50%, -50%); }
      .sign-stationery { left: 56.7%; top: 43.4%; width: 32%; transform: translate(-50%, -50%); }
      .sign-game { left: 47.7%; right: auto; top: 65%; width: 34.4%; transform: translate(-50%, -50%); }
    }
  </style>
</head>
<body>
  <main class="page">
    <header class="topbar">
      <div class="brand">
        <strong>禮品、文具、桌遊</strong>
        <span>閱讀動物園選物區</span>
      </div>
      <a class="nav-link" href="index.html" data-footstep-transition data-transition-label="返回首頁" data-transition-direction="left">返回首頁</a>
    </header>
    <section class="stage" aria-label="禮品區入口">
      <div class="stage-frame">
        <picture><source media="(max-width: 767px)" srcset="assets/gift/stage-mobile.png"><img class="stage-bg" src="assets/gift/stage-desktop.png" alt=""></picture>
        <div class="signs" aria-label="禮品區入口">
          <a class="sign sign-gift sign-link" href="gift-products.html" aria-label="禮品區"><img src="assets/gift/sign-gift.png" alt="禮品區"></a>
          <a class="sign sign-stationery sign-link" href="stationery-products.html" aria-label="文具區"><img src="assets/gift/sign-stationery.png" alt="文具區"></a>
          <a class="sign sign-game sign-link" href="board-games.html" aria-label="桌遊區"><img src="assets/gift/sign-board-games.png" alt="桌遊區"></a>
        </div>
      </div>
    </section>
  </main>
  <script src="assets/common/footstep-transition.js"></script>
</body>
</html>

<!doctype html>
<html lang="zh-Hant">
<head>
  <!-- Cleaned deploy package: assets reorganized under /assets and /data. -->
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  
  <link rel="icon" type="image/png" href="../assets/common/favicon.png">

  <link rel="stylesheet" href="../assets/common/footstep-transition.css">
  <style>
    :root {
      --ink: #3d2b1f;
      --muted: #765d45;
      --paper: rgba(255, 249, 235, .9);
      --line: rgba(126, 87, 50, .24);
      --accent: #8f4c24;
    }
    * { box-sizing: border-box; }
    body { margin: 0; min-height: 100vh; color: var(--ink); background: #efe1c7; font-family: "Noto Sans TC", "Microsoft JhengHei", "PingFang TC", sans-serif; cursor: url("../assets/common/bear-cursor-64.png") 14 2, auto; }
    a { color: inherit; text-decoration: none; }
    .page { min-height: 100vh; background: linear-gradient(180deg, rgba(255, 249, 233, .30), rgba(239, 225, 199, .76)), url("../assets/books/bear/bg-desktop.png") center top / cover fixed; }
    .topbar { position: sticky; top: 0; z-index: 20; display: flex; align-items: center; justify-content: space-between; gap: 16px; padding: 14px clamp(18px, 4vw, 44px); border-bottom: 1px solid rgba(82, 58, 32, .14); background: rgba(255, 248, 232, .78); backdrop-filter: blur(10px); transform: translateY(0); transition: transform .22s ease; }
    .topbar.is-hidden { transform: translateY(calc(-100% - 2px)); }
    .topbar.is-visible, .topbar:focus-within, .topbar:hover { transform: translateY(0); }
    .brand-wrap { display: flex; align-items: center; gap: 12px; min-width: 0; }
    .home-link { display: inline-grid; place-items: center; width: 64px; height: 64px; flex: 0 0 auto; }
    .home-logo { display: block; width: 56px; height: 56px; object-fit: contain; }
    .brand strong { display: block; font-size: clamp(24px, 3vw, 40px); line-height: 1.05; letter-spacing: .04em; }
    .brand span { display: block; margin-top: 4px; color: var(--muted); font-size: 14px; letter-spacing: .08em; }
    .nav { display: inline-flex; align-items: center; justify-content: center; min-height: 38px; padding: 8px 15px; border-radius: 999px; color: #fffaf0; background: #5f704c; font-weight: 700; white-space: nowrap; }
    .layout { width: min(1320px, calc(100% - 32px)); margin: 0 auto; padding: 0 0 56px; }
    .stump-stage { width: min(1240px, 100%); margin: -18px auto 0; display: grid; grid-template-columns: repeat(4, minmax(0, 1fr)); align-items: end; gap: clamp(14px, 2vw, 26px); padding: 0; }
    .book-stand { position: relative; display: grid; justify-items: center; align-items: end; min-height: clamp(350px, 37vw, 520px); padding-bottom: 34px; }
    .feature-book { position: absolute; left: 50%; bottom: clamp(84px, 9vw, 126px); z-index: 3; width: clamp(112px, 11vw, 174px); padding: 0; border: 0; background: transparent; cursor: url("../assets/common/bear-cursor-64.png") 14 2, pointer; transform: translateX(-50%); transform-origin: 50% 92%; transition: transform .18s ease, filter .18s ease; -webkit-tap-highlight-color: transparent; }
    .feature-book.book-c136 { width: clamp(124px, 12.5vw, 192px); }
    .feature-book:hover, .feature-book:focus-visible { filter: drop-shadow(0 18px 18px rgba(61, 37, 15, .28)); transform: translateX(-50%) translateY(-7px); outline: none; }
    .feature-book.is-pressed { animation: bookPress .22s ease; }
    .feature-book img { display: block; width: 100%; height: auto; pointer-events: none; filter: drop-shadow(0 20px 18px rgba(61, 37, 15, .24)); }
    .stump { position: relative; z-index: 1; width: min(330px, 112%); height: auto; pointer-events: none; filter: drop-shadow(0 22px 28px rgba(66, 38, 14, .22)); }
    .book-label-main { display: block; } .book-label-sub { display: block; margin-top: 2px; font-size: .86em; line-height: 1.18; } .book-label { position: absolute; left: 50%; bottom: 34px; z-index: 2; width: min(245px, 108%); padding: 9px 16px; border: 1px solid rgba(126, 87, 50, .24); border-radius: 999px; color: #5f3d21; background: rgba(255, 249, 235, .9); box-shadow: 0 10px 20px rgba(69, 45, 22, .14); font-size: 15px; font-weight: 900; line-height: 1.25; text-align: center; transform: translateX(-50%); }
    .book-discount { position: absolute; left: 50%; bottom: -4px; z-index: 2; display: inline-grid; grid-auto-flow: column; gap: 6px; align-items: center; justify-content: center; width: min(245px, 108%); transform: translateX(-50%); font-size: 13px; font-weight: 900; line-height: 1; }
    .book-discount span { display: inline-flex; align-items: center; justify-content: center; min-height: 26px; padding: 6px 10px; border-radius: 999px; color: #fff8eb; background: var(--accent); box-shadow: 0 9px 18px rgba(69, 45, 22, .14); white-space: nowrap; }
    .book-gift { position: absolute; left: 50%; bottom: -38px; z-index: 2; width: max-content; max-width: min(178px, 118%); padding: 7px 10px; border-radius: 8px; color: #5f3d21; background: rgba(255, 249, 235, .95); box-shadow: 0 9px 18px rgba(69, 45, 22, .12); transform: translateX(-50%); font-size: 12px; font-weight: 900; line-height: 1.35; text-align: center; }
    .book-stand:has(.book-gift) { margin-bottom: 28px; }
    @keyframes bookPress { 0% { transform: translateX(-50%) scale(1, 1); } 45% { transform: translateX(-50%) translateY(10px) scale(1.08, .82); } 100% { transform: translateX(-50%) scale(1, 1); } }
    .book-dialog { width: min(420px, calc(100% - 34px)); padding: 0; border: 0; border-radius: 8px; background: transparent; }
    .book-dialog::backdrop { background: rgba(38, 24, 12, .36); }
    .dialog-card { padding: 24px; border: 1px solid var(--line); border-radius: 8px; color: var(--ink); background: rgba(255, 249, 235, .96); box-shadow: 0 24px 54px rgba(39, 24, 11, .28); }
    .dialog-code { color: var(--accent); font-size: 13px; font-weight: 900; letter-spacing: .12em; }
    .dialog-title { margin: 6px 0 10px; font-size: 24px; line-height: 1.25; }
    .dialog-price { margin: 0 0 20px; color: var(--muted); font-weight: 700; line-height: 1.6; white-space: pre-line; }
    .dialog-actions { display: flex; gap: 10px; justify-content: flex-end; }
    .dialog-button { min-height: 38px; padding: 8px 14px; border: 0; border-radius: 999px; font: inherit; font-weight: 900; cursor: pointer; }
    .dialog-close { background: rgba(95, 112, 76, .16); color: #4d583d; }
    .dialog-buy { background: #5f704c; color: #fffaf0; }
    @media (max-width: 1180px) { .stump-stage { grid-template-columns: repeat(3, minmax(0, 1fr)); } }
    @media (max-width: 767px) { body { cursor: auto; } .page { background: linear-gradient(180deg, rgba(255, 249, 233, .16), rgba(239, 225, 199, .88)), url("../assets/books/bear/bg-mobile.png") center top / cover fixed; } .topbar { align-items: flex-start; padding: 12px 14px; } .brand-wrap { gap: 9px; } .home-link { width: 54px; height: 54px; } .home-logo { width: 46px; height: 46px; } .brand strong { font-size: 24px; } .brand span { font-size: 12px; } .nav { min-height: 34px; padding: 7px 12px; font-size: 14px; } .layout { width: calc(100% - 20px); padding: 6px 0 32px; } .stump-stage { width: 100%; margin: -8px auto 0; grid-template-columns: repeat(2, minmax(0, 1fr)); gap: 10px 8px; } .book-stand { min-height: clamp(250px, 72vw, 330px); padding-bottom: 26px; } .feature-book { bottom: clamp(70px, 22vw, 96px); width: clamp(86px, 31vw, 124px); } .feature-book.book-c136 { width: clamp(96px, 35vw, 140px); } .stump { width: min(180px, 116%); } .book-label { bottom: 28px; width: min(170px, 112%); padding: 7px 9px; font-size: 12px; line-height: 1.22; } .book-discount { bottom: 0; width: min(170px, 112%); gap: 4px; font-size: 11px; } .book-discount span { min-height: 22px; padding: 5px 7px; } }
    @media (max-width: 420px) { .book-label { font-size: 11px; } .book-discount { font-size: 10px; } .book-discount span { padding: 5px 6px; } }
  </style>

  <script src="../assets/common/footstep-transition.js?v=20260615"></script>
  <script>
    (() => {
      const topbar = document.querySelector(".topbar");
      let timer = 0;
      const show = () => {
        topbar.classList.add("is-visible");
        topbar.classList.remove("is-hidden");
        clearTimeout(timer);
        timer = setTimeout(() => {
          topbar.classList.remove("is-visible");
          topbar.classList.add("is-hidden");
        }, 1600);
      };
      topbar.classList.add("is-hidden");
      window.addEventListener("scroll", show, { passive: true });
      window.addEventListener("pointermove", (event) => { if (event.clientY <= 72) show(); }, { passive: true });
      window.addEventListener("touchstart", (event) => { if (event.touches[0]?.clientY <= 88) show(); }, { passive: true });
      topbar.addEventListener("focusin", show);
    })();

    const books = {
      "C294": {
            "code": "C294",
            "title": "重建聖殿的榮美",
            "price": "定價 NT$ 300 / 79折特價 NT$ 237",
            "url": "https://www.pbooks.com.tw/products/c294"
      },
      "C295": {
            "code": "C295",
            "title": "物理學 × 主裡學",
            "price": "定價 NT$ 350 / 79折特價 NT$ 277",
            "url": "https://www.pbooks.com.tw/products/c295"
      },
      "C290": {
            "code": "C290",
            "title": "洗禮論-教義專論(購買即贈安息日論)",
            "price": "定價 NT$ 350 / 79折特價 NT$ 277",
            "url": "https://www.pbooks.com.tw/products/c290"
      },
      "C291": {
            "code": "C291",
            "title": "路得記講壇 - 倫理篇／家庭的復興",
            "price": "定價 NT$ 250 / 79折特價 NT$ 198",
            "url": "https://www.pbooks.com.tw/products/c291"
      },
      "C292": {
            "code": "C292",
            "title": "使徒行傳釋義",
            "price": "定價 NT$ 500 / 79折特價 NT$ 395",
            "url": "https://www.pbooks.com.tw/products/c292"
      },
      "C293": {
            "code": "C293",
            "title": "親身體會神的大愛",
            "price": "定價 NT$ 350 / 79折特價 NT$ 277",
            "url": "https://www.pbooks.com.tw/products/c293"
      },
      "C002": {
            "code": "C002",
            "title": "好好接住你／從聖經談憂傷療癒的輔導知能",
            "price": "定價 NT$ 250 / 79折特價 NT$ 198",
            "url": "https://www.pbooks.com.tw/products/c002"
      },
      "C136": {
            "code": "C136",
            "title": "進入聖經的世界",
            "price": "定價 NT$ 800 / 79折特價 NT$ 632\n買就送實用釋經學",
            "url": "https://www.pbooks.com.tw/products/c136"
      },
      "C185": {
            "code": "C185",
            "title": "活讀猶大書－為真道竭力爭辯",
            "price": "定價 NT$ 350 / 79折特價 NT$ 277",
            "url": "https://www.pbooks.com.tw/products/c185"
      }
};
    const dialog = document.querySelector("[data-book-dialog]");
    const dialogCode = dialog.querySelector("[data-dialog-code]");
    const dialogTitle = dialog.querySelector("[data-dialog-title]");
    const dialogPrice = dialog.querySelector("[data-dialog-price]");
    const dialogBuy = dialog.querySelector("[data-dialog-buy]");
    const closeButton = dialog.querySelector("[data-dialog-close]");
    let activeUrl = "";
    document.querySelectorAll("[data-book-code]").forEach((button) => {
      button.addEventListener("click", () => {
        const code = button.dataset.bookCode;
        const book = books[code];
        if (!book) return;
        button.classList.remove("is-pressed");
        void button.offsetWidth;
        button.classList.add("is-pressed");
        dialogCode.textContent = book.code;
        dialogTitle.textContent = book.title;
        dialogPrice.textContent = book.price;
        activeUrl = book.url;
        if (typeof dialog.showModal === "function") { dialog.showModal(); } else { window.open(activeUrl, "_blank", "noopener"); }
      });
    });
    closeButton.addEventListener("click", () => dialog.close());
    dialogBuy.addEventListener("click", () => { if (activeUrl) window.open(activeUrl, "_blank", "noopener"); dialog.close(); });
  </script>
